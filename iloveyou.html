<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>guinguoithuong</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: palevioletred;
        font-family: Arial, Helvetica, sans-serif;
        gap: 20px;
      }

      .noi_dung {
        text-align: center;
        border: 2px solid red;
        padding: 20px;
        border-radius: 10px;
        background-color: #ffffff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }

      .noi_dung h1 {
        color: #ff0000;
      }

      .noi_dung p {
        font-size: 20px;
        color: #333;
      }

      .heart {
        font-size: 50px;
        color: #ff0000;
        margin: 10px 0;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      .container img {
        max-width: 300px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      button {
        padding: 10px 20px;
        background-color: #ff0000;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background-color: #cc0000;
      }
    </style>
  </head>
  <body>
    <div class="noi_dung">
      <h1>Xin chào Người Ấy</h1>
      <p class="heart">❤️</p>
      <p>iu lắm đó</p>
    </div>

    <div class="container">
      <img
        src="https://thumbs.dreamstime.com/b/romantic-young-man-flowers-date-17586903.jpg"
        alt="Ảnh"
      />
      <a href="noidung.html">
        <button>Nhấp vào đây</button>
      </a>
    </div>
  </body>
</html>
